<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="OasisSpace - Find your perfect home, apartments, and villas for rent and sale. Check out exclusive offers today." />

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- Performance: Removed unused Google Fonts preconnect to eliminate Render Blocking 350ms false-positive -->

  <!-- LCP Preload: Hero Background Image (WebP Compressed) -->
  <link rel="preload" href="/home.webp" as="image" type="image/webp" fetchpriority="high" />

  <script>
    // Global variable banaya taaki Header.jsx isse access kar sake
    window.deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      // 1. Browser ka default mini-infobar roko
      e.preventDefault();
      // 2. Event ko global window object mein save karo
      window.deferredPrompt = e;
      console.log("⚡ PWA Event Caught Globally in index.html!");
    });
  </script>
  <title>OasisSpace</title>
</head>

<body>

  <!-- PURE CSS PRELOADER: Auto-fades after 800ms, does NOT block LCP measurement -->
  <div id="css-preloader" style="
    position:fixed;inset:0;z-index:9999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#e2e8f0;
    animation:preloaderFade 0.5s ease-out 0.8s forwards;
    pointer-events:auto;
  ">
    <img src="/logo.png" alt="OasisSpace" width="160" height="160"
      style="border-radius:50%;box-shadow:0 8px 32px rgba(0,0,0,0.15);border:4px solid #fff;object-fit:cover;animation:bounce 1s infinite;" />
    <h1 style="font-size:1.875rem;font-weight:700;color:#1e293b;margin-top:1.5rem;font-family:serif;">Welcome to Oasis
      Space</h1>
    <p style="color:#475569;margin-top:0.5rem;font-size:1.125rem;">Finding your dream home...</p>
  </div>
  <style>
    @keyframes preloaderFade {
      to {
        opacity: 0;
        visibility: hidden;
        pointer-events: none
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-20px)
      }
    }
  </style>

  <svg width="0" height="0" style="position: absolute; display: block; height: 0; width: 0; overflow: hidden;">
    <defs>
      <filter id="smart-sharpen" x="-20%" y="-20%" width="140%" height="140%">
        <feConvolveMatrix order="3,3" kernelMatrix="0 -1 0   -1 5 -1   0 -1 0" />
      </filter>
    </defs>
  </svg>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
